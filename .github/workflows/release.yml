name: Release

# Push a version tag (e.g. v0.1.1) to build installers for macOS, Windows and
# Linux and publish them to a GitHub Release. electron-builder creates the
# release as a DRAFT — review it in the repo's Releases tab, then hit Publish
# so users (and the in-app auto-updater) can see it.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
